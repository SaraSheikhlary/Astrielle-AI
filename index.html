<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrielle AI</title>
    <style>
    /* 1. Make the body background this new custom image */
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        width: 100%; 
        overflow: hidden;
        
        /* THE MAGIC PART: This sets the Quantum Cosmic Network as your background */
        background-image: url('https://i.ibb.co/Xz9vH5J/quantum-cosmic-neural-net.png');
        background-size: cover;          /* Makes the image fill the entire screen */
        background-position: center;     /* Centers the most beautiful part of the image */
        background-repeat: no-repeat;    /* Prevents the image from tiling */
        background-attachment: fixed;    /* Keeps the background from scrolling with the app */
        background-color: #0e1117;       /* A fallback color just in case the image takes a second to load */
    }

    /* 2. Style the 'Window' that holds your app */
    iframe { 
        width: 100%; 
        height: 100%; 
        border: none; 
        position: absolute; 
        top: 0; 
        left: 0; 
        
        /* THE CRUCIAL PART: Make the background of your app-window transparent */
        background: transparent !important;
        background-color: transparent !important;
    }
</style>
    
</head>
<body>
    <iframe 
        src="https://astrielle-monitor-app-zdhgxrjugepdkz5puumneb.streamlit.app/?embedded=true" 
        allow="camera; microphone; clipboard-write;"
    ></iframe>
</body>
</html>
